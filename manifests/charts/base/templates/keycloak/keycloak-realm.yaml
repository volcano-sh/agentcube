{{- if .Values.keycloak.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-realm-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: keycloak
type: Opaque
# stringData accepts plain text and Kubernetes base64-encodes it automatically.
stringData:
  # Note: The --import-realm flag only applies this JSON on an empty/first start.
  # Once the realm exists, subsequent pod restarts will silently IGNORE updates to this Secret.
  # To update a live production realm, use the Keycloak Admin API or a declarative tool.
  # Filename must follow <realm-name>-realm.json convention for --import-realm to detect it.
  {{ printf "%s-realm.json" .Values.keycloak.realm | quote }}: |
    {
      "realm": {{ .Values.keycloak.realm | quote }},
      "enabled": true,
      "sslRequired": {{ if .Values.keycloak.devMode }}"none"{{ else }}"external"{{ end }},

      "defaultRole": {
        "name": "default-roles-{{ .Values.keycloak.realm }}",
        "description": "${role_default-roles}",
        "composite": true,
        "clientRole": false
      },

      "roles": {
        "realm": [
          {
            "name": "default-roles-{{ .Values.keycloak.realm }}",
            "description": "${role_default-roles}",
            "composite": true,
            "clientRole": false,
            "composites": {
              "realm": [
                "sandbox:invoke"
              ]
            }
          },
          {
            "name": "sandbox:invoke",
            "description": "Permission to invoke agent runtimes and code interpreters."
          },
          {
            "name": "sandbox:manage",
            "description": "Permission to create/delete AgentRuntime and CodeInterpreter CRDs. Inherits sandbox:invoke.",
            "composite": true,
            "composites": {
              "realm": ["sandbox:invoke"]
            }
          },
          {
            "name": "admin",
            "description": "Full administrative access. Inherits sandbox:manage.",
            "composite": true,
            "composites": {
              "realm": ["sandbox:manage"]
            }
          }
        ]
      },

      "clients": [
        {
          "clientId": "agentcube-sdk",
          "name": "AgentCube SDK",
          "description": "Confidential client for SDK access. Supports client_credentials for service accounts and authorization_code for interactive users.",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "secret": {{ required "keycloak.clients.sdk.secret is required when keycloak.enabled is true" .Values.keycloak.clients.sdk.secret | quote }},
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": true,
          "redirectUris": {{ .Values.keycloak.sdk.redirectUris | toJson }},
          "webOrigins": {{ .Values.keycloak.sdk.webOrigins | toJson }}
        },
        {
          "clientId": "agentcube-router",
          "name": "AgentCube Router",
          "description": "Internal service client for the Router component.",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "secret": {{ required "keycloak.clients.router.secret is required when keycloak.enabled is true" .Values.keycloak.clients.router.secret | quote }},
          "standardFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": true,
          "redirectUris": [],
          "webOrigins": []
        },
        {
          "clientId": "workloadmanager",
          "name": "WorkloadManager",
          "description": "Audience client for downstream JWT validation. All auth flows disabled (modern replacement for deprecated bearer-only).",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "standardFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": false,
          "redirectUris": [],
          "webOrigins": []
        },
        {
          "clientId": "agentcube-admin",
          "name": "AgentCube Admin",
          "description": "Confidential client for administrative operations.",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "secret": {{ required "keycloak.clients.admin.secret is required when keycloak.enabled is true" .Values.keycloak.clients.admin.secret | quote }},
          "standardFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": true,
          "redirectUris": [],
          "webOrigins": []
        }
      ],

      "scopeMappings": [
        {
          "client": "agentcube-sdk",
          "roles": ["sandbox:invoke"]
        }
      ]
    }
{{- end }}
