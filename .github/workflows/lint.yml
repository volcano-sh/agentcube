name: Lint

on:
  pull_request:
    branches:
      - main
      - "release-*"

permissions:
  contents: read
  # Optional: allow read access to pull request. Use with `only-new-issues` option.
  pull-requests: read

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      lint: ${{ steps.filter.outputs.lint }}
      gofmt: ${{ steps.filter.outputs.gofmt }}
      helm: ${{ steps.filter.outputs.helm }}
    steps:
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            lint:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
              - '.github/workflows/lint.yml'
            gofmt:
              - '**/*.go'
              - 'Makefile'
              - '.github/workflows/lint.yml'
            helm:
              - 'manifests/charts/base/**'
              - 'Makefile'
              - '.github/workflows/lint.yml'

  golangci:
    name: golangci-lint
    needs: changes
    if: needs.changes.outputs.lint == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run golangci-lint
        run: make lint

  gofmt:
    name: gofmt
    needs: changes
    if: needs.changes.outputs.gofmt == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Check Go formatting
        run: make fmt-check

  helm:
    name: helm-lint
    needs: changes
    if: needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Check Helm chart
        run: make helm-check
