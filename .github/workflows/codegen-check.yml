name: Codegen Check

on:
  pull_request:
    branches:
      - main
      - "release-*"

jobs:
  codegen-check:
    name: Codegen Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify Generated Code
        run: |
          make gen-check
