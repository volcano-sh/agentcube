{{- if .Values.spire.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-server-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: spire-server
data:
  server.conf: |
    server {
        bind_address = "0.0.0.0"
        bind_port    = "{{ .Values.spire.server.service.port }}"
        socket_path  = "/tmp/spire-server/private/api.sock"
        trust_domain = "{{ .Values.spire.trustDomain }}"
        data_dir     = "/run/spire/data"

        ca_ttl                = "{{ .Values.spire.server.ca.ttl }}"
        default_x509_svid_ttl = "{{ .Values.spire.server.ca.x509SvidDefaultTtl }}"
    }

    plugins {
        DataStore "sql" {
            plugin_data {
                database_type     = "{{ .Values.spire.server.dataStore.type }}"
                connection_string = "{{ .Values.spire.server.dataStore.connectionString }}"
            }
        }

        NodeAttestor "k8s_psat" {
            plugin_data {
                clusters = {
                    "{{ .Values.spire.clusterName }}" = {
                        service_account_allow_list = [
                            "{{ .Release.Namespace }}:spire-agent"
                        ]
                    }
                }
            }
        }

        KeyManager "disk" {
            plugin_data {
                keys_path = "/run/spire/data/keys.json"
            }
        }
    }

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: spire-server
  namespace: {{ .Release.Namespace }}
  labels:
    app: spire-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spire-server
  serviceName: spire-server
  template:
    metadata:
      labels:
        app: spire-server
    spec:
      serviceAccountName: spire-server
      containers:
        - name: spire-server
          image: "{{ .Values.spire.server.image.repository }}:{{ .Values.spire.server.image.tag }}"
          imagePullPolicy: {{ .Values.spire.server.image.pullPolicy }}
          args: ["-config", "/run/spire/config/server.conf"]
          ports:
            - name: grpc
              containerPort: {{ .Values.spire.server.service.port }}
              protocol: TCP
          volumeMounts:
            - name: spire-config
              mountPath: /run/spire/config
              readOnly: true
            - name: spire-data
              mountPath: /run/spire/data
            - name: spire-server-socket
              mountPath: /tmp/spire-server/private
          livenessProbe:
            exec:
              command:
                - /opt/spire/bin/spire-server
                - healthcheck
            initialDelaySeconds: 15
            periodSeconds: 60
          readinessProbe:
            exec:
              command:
                - /opt/spire/bin/spire-server
                - healthcheck
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.spire.server.resources | nindent 12 }}
        # Controller Manager runs as a sidecar, sharing the SPIRE Server's API socket
        - name: spire-controller-manager
          image: "{{ .Values.spire.controllerManager.image.repository }}:{{ .Values.spire.controllerManager.image.tag }}"
          imagePullPolicy: {{ .Values.spire.controllerManager.image.pullPolicy }}
          args:
            - -config
            - /etc/spire-controller-manager/spire-controller-manager.yaml
          ports:
            - name: https
              containerPort: 9443
              protocol: TCP
            - name: health
              containerPort: 8083
              protocol: TCP
          volumeMounts:
            - name: spire-server-socket
              mountPath: /tmp/spire-server/private
              readOnly: false
            - name: controller-manager-config
              mountPath: /etc/spire-controller-manager
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 60
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.spire.controllerManager.resources | nindent 12 }}
      volumes:
        - name: spire-config
          configMap:
            name: spire-server-config
        - name: spire-data
          emptyDir: {}  # Re-synced from ClusterSPIFFEID CRDs on restart; PVC not required
        - name: spire-server-socket
          emptyDir: {}  # Shared between SPIRE Server and Controller Manager for API socket
        - name: controller-manager-config
          configMap:
            name: spire-controller-manager-config

---
apiVersion: v1
kind: Service
metadata:
  name: spire-server
  namespace: {{ .Release.Namespace }}
  labels:
    app: spire-server
spec:
  type: {{ .Values.spire.server.service.type }}
  ports:
    - name: grpc
      port: {{ .Values.spire.server.service.port }}
      targetPort: {{ .Values.spire.server.service.port }}
      protocol: TCP
  selector:
    app: spire-server
{{- end }}
