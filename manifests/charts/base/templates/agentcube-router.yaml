apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentcube-router
  namespace: {{ .Release.Namespace }}
  labels:
    app: agentcube-router
spec:
  replicas: {{ .Values.router.replicas }}
  selector:
    matchLabels:
      app: agentcube-router
  template:
    metadata:
      labels:
        app: agentcube-router
    spec:
      {{- if .Values.router.serviceAccountName }}
      serviceAccountName: {{ .Values.router.serviceAccountName }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        {{- if .Values.spire.enabled }}
        - name: spiffe-helper
          image: "{{ .Values.spire.spiffeHelper.image.repository }}:{{ .Values.spire.spiffeHelper.image.tag }}"
          imagePullPolicy: {{ .Values.spire.spiffeHelper.image.pullPolicy }}
          args:
            - "-config"
            - "/etc/spiffe-helper/spiffe-helper.conf"
          volumeMounts:
            - name: spiffe-helper-config
              mountPath: /etc/spiffe-helper
              readOnly: true
            - name: spire-agent-socket
              mountPath: /run/spire/sockets
              readOnly: true
            - name: spire-certs
              mountPath: {{ .Values.spire.spiffeHelper.certDir }}
        {{- end }}
        - name: agentcube-router
          {{- if .Values.spire.enabled }}
          volumeMounts:
            - name: spire-certs
              mountPath: {{ .Values.spire.spiffeHelper.certDir }}
              readOnly: true
          {{- end }}
          image: "{{ .Values.router.image.repository }}:{{ .Values.router.image.tag }}"
          imagePullPolicy: {{ .Values.router.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.router.service.targetPort }}
              protocol: TCP
          env:
            - name: AGENTCUBE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REDIS_ADDR
              value: {{ .Values.redis.addr | quote }}
            - name: REDIS_PASSWORD
              value: {{ .Values.redis.password | quote }}
            - name: WORKLOAD_MANAGER_URL
              value: "http://workloadmanager.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.workloadmanager.service.port }}"
            {{- with .Values.router.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          args:
            - --port={{ .Values.router.service.targetPort }}
            - --debug
            {{- if .Values.router.picodAuthMode }}
            - --picod-auth-mode={{ .Values.router.picodAuthMode }}
            {{- end }}
          resources:
            {{- toYaml .Values.router.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: {{ .Values.router.service.targetPort }}
            initialDelaySeconds: 1
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /health/ready
              port: {{ .Values.router.service.targetPort }}
            initialDelaySeconds: 1
            periodSeconds: 2
      {{- if .Values.spire.enabled }}
      volumes:
        - name: spire-agent-socket
          hostPath:
            path: /run/spire/sockets
            type: DirectoryOrCreate
        - name: spiffe-helper-config
          configMap:
            name: spiffe-helper-config
        - name: spire-certs
          emptyDir: {}
      {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: agentcube-router
  namespace: {{ .Release.Namespace }}
  labels:
    app: agentcube-router
spec:
  type: {{ .Values.router.service.type }}
  ports:
    - port: {{ .Values.router.service.port }}
      targetPort: {{ .Values.router.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    app: agentcube-router
