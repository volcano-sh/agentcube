{{- if .Values.keycloak.enabled }}
{{- $renderAdmin := not .Values.keycloak.existingSecret }}
{{- $renderDb := and .Values.keycloak.database.vendor (not .Values.keycloak.database.existingSecret) }}
{{- $renderClients := not .Values.keycloak.clients.existingSecret }}
{{- if or $renderAdmin $renderDb $renderClients }}
# Chart-managed Secret for Keycloak admin, database, and/or client credentials.
# Rendered if any of these credentials need to be managed by the chart.
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    app: keycloak
type: Opaque
stringData:
  {{- if $renderAdmin }}
  admin-password: {{ required "keycloak.adminPassword is required when keycloak.existingSecret is not set" .Values.keycloak.adminPassword | quote }}
  {{- end }}
  {{- if $renderDb }}
  db-password: {{ required "keycloak.database.password is required when keycloak.database.vendor is set and keycloak.database.existingSecret is not set" .Values.keycloak.database.password | quote }}
  {{- end }}
  {{- if $renderClients }}
  client-service-secret: {{ required "keycloak.clients.service.secret is required when keycloak.clients.existingSecret is not set" .Values.keycloak.clients.service.secret | quote }}
  client-router-secret: {{ required "keycloak.clients.router.secret is required when keycloak.clients.existingSecret is not set" .Values.keycloak.clients.router.secret | quote }}
  client-admin-secret: {{ required "keycloak.clients.admin.secret is required when keycloak.clients.existingSecret is not set" .Values.keycloak.clients.admin.secret | quote }}
  {{- end }}
{{- end }}
{{- end }}
