apiVersion: runtime.agentcube.volcano.sh/v1alpha1
kind: AgentRuntime
metadata:
  name: simple-agentruntime
  namespace: default
spec:
  targetPort:
    - pathPrefix: "/echo"
      port: 8080
      protocol: "HTTP"
  podTemplate:
    labels:
      label-foo: label-bar
    annotations:
      annotation-foo: annotation-bar
    spec:
      containers:
        - name: simple
          image: python:3.11-slim
          ports:
            - containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /echo
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /echo
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          command: ["python3", "-c"]
          args:
            - |
              import http.server
              import json
              import signal
              import sys

              class EchoHandler(http.server.BaseHTTPRequestHandler):
                  def send_json(self, status, body):
                      payload = json.dumps(body).encode("utf-8")
                      self.send_response(status)
                      self.send_header("Content-Type", "application/json")
                      self.send_header("Content-Length", str(len(payload)))
                      self.end_headers()
                      self.wfile.write(payload)

                  def do_GET(self):
                      if self.path == "/echo":
                          self.send_json(200, {"status": "healthy"})
                      else:
                          self.send_json(404, {"error": "not found"})

                  def do_POST(self):
                      if self.path != "/echo":
                          self.send_json(404, {"error": "not found"})
                          return
                      try:
                          length = int(self.headers.get("Content-Length", "0"))
                          request = json.loads(self.rfile.read(length) or b"{}")
                      except (ValueError, UnicodeDecodeError):
                          self.send_json(400, {"error": "invalid JSON request body"})
                          return
                      if not isinstance(request, dict):
                          self.send_json(400, {"error": "request body must be a JSON object"})
                          return
                      input_text = request.get("input", "")
                      self.send_json(200, {"output": f"echo: {input_text}"})

                  def log_message(self, format, *args):
                      pass

              signal.signal(signal.SIGTERM, lambda *_: sys.exit(0))
              http.server.ThreadingHTTPServer(("0.0.0.0", 8080), EchoHandler).serve_forever()
  sessionTimeout: "15m"
  maxSessionDuration: "8h"
