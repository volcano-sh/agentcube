apiVersion: runtime.agentcube.volcano.sh/v1alpha1
kind: AgentRuntime
metadata:
  name: simple-agentruntime
  namespace: default
spec:
  targetPort:
    - pathPrefix: "/"
      port: 8080
      protocol: "HTTP"
  podTemplate:
    labels:
      label-foo: label-bar
    annotations:
      annotation-foo: annotation-bar
    spec:
      containers:
        - name: simple
          image: busybox
          command: ["/bin/sh", "-c", "sleep 36000"]
  sessionTimeout: "15m"
  # maxSessionDuration is optional. When omitted, the sandbox runs indefinitely
  # and is only cleaned up by the idle timeout (sessionTimeout) above.
  # Uncomment the line below to set a hard upper limit on session lifetime.
  # maxSessionDuration: "24h"