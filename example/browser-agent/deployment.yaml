apiVersion: apps/v1
kind: Deployment
metadata:
  name: browser-agent
  namespace: default
  labels:
    app: browser-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: browser-agent
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: browser-agent
    spec:
      containers:
        - name: browser-agent
          image: browser-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: browser-agent-secrets
                  key: openai-api-key
            - name: OPENAI_API_BASE
              value: "https://api.deepseek.com/v1" # Change to your LLM API base
            - name: OPENAI_MODEL
              value: "deepseek-chat"
            - name: ROUTER_URL
              value: "http://agentcube-router.agentcube.svc.cluster.local:8080"
            - name: PLAYWRIGHT_MCP_KIND
              value: "BrowserUse" # Set AgentRuntime when using browser-use-tool.yaml
            - name: PLAYWRIGHT_MCP_NAME
              value: "browser-use-tool" # Must match BrowserUse CRD name
            - name: PLAYWRIGHT_MCP_NAMESPACE
              value: "default"
            - name: BROWSER_TASK_TIMEOUT
              value: "300"
            - name: MAX_TOOL_ROUNDS
              value: "10"
          command: ["uv"]
          args: ["run", "browser_agent.py"]
