# Default values for the Keycloak addon chart.

# Global settings
replicas: 1
imagePullSecrets: []

# Use start-dev mode (embedded H2 DB, HTTP) for local development.
# Set to false for production — requires database.vendor and proxy settings below.
devMode: true
image:
  repository: quay.io/keycloak/keycloak
  tag: "26.0.8"
  pullPolicy: IfNotPresent
adminUser: ""           # Required.
adminPassword: ""       # Dev only. Production must use existingSecret.
existingSecret: ""       # Name of a pre-existing Secret containing admin credentials
existingSecretKey: "admin-password"  # Key within the Secret holding the password
# External database configuration (required when devMode is false)
database:
  vendor: ""             # Database type: "postgres", "mysql", "mariadb". Empty = embedded H2 (dev only).
  url: ""                # JDBC URL, e.g., "jdbc:postgresql://postgres:5432/keycloak"
  username: ""
  password: ""
  existingSecret: ""     # Name of a pre-existing Secret containing the database password
  existingSecretKey: "db-password"
# Reverse proxy configuration (required when Keycloak is behind an Ingress or load balancer)
proxy:
  headers: ""            # Proxy header mode: "xforwarded" or "forwarded". Empty = disabled.
  httpEnabled: false     # Allow HTTP traffic when running behind a TLS-terminating proxy
  hostname: ""           # Public hostname, e.g., "keycloak.example.com". Empty = auto-detect.
service:
  type: ClusterIP
  port: 8080
realm: "agentcube"
# Client secrets for confidential OAuth2 clients.
# The agentcube-sdk client is public (PKCE) and does not require a secret.
clients:
  existingSecret: ""       # Name of a pre-existing Secret containing client secrets
  # The keys below are only used if existingSecret is SET.
  # They define which keys inside your external Secret hold the actual passwords.
  existingSecretServiceKey: "client-service-secret"
  existingSecretRouterKey: "client-router-secret"
  existingSecretAdminKey: "client-admin-secret"
  service:
    secret: ""
  router:
    secret: ""
  admin:
    secret: ""
# TLS configuration for Keycloak terminating TLS directly (devMode=false only)
tls:
  existingSecret: ""              # Name of pre-existing Secret containing tls.crt and tls.key
  secretCertificateKey: "tls.crt" # Key inside the secret holding the certificate
  secretPrivateKeyKey: "tls.key"  # Key inside the secret holding the private key
sdk:
  # WARNING: Wildcard URIs (e.g. 'http://localhost*') pose security risks (open redirect vulnerabilities) in production.
  # When devMode is false, the deployment will fail if these contain wildcards.
  # You must override these with explicit, fully-qualified URIs for production.
  redirectUris:
    - "http://localhost*"
  webOrigins:
    - "http://localhost*"
resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 512Mi
