# Example: CodeInterpreter with NetworkPolicy enabled
#
# Three examples are shown below:
#
# 1. Restricted mode  - deny-all baseline, DNS and router ingress always allowed
# 2. Restricted mode with extra egress - allow outbound to a specific CIDR
# 3. Custom mode      - bring your own raw NetworkPolicy rules
#
# Default mode is "None" (no NetworkPolicy created), so existing setups are unaffected.

---
# 1. Restricted mode — simplest secure setup
apiVersion: runtime.agentcube.volcano.sh/v1alpha1
kind: CodeInterpreter
metadata:
  name: interpreter-restricted
  namespace: default
spec:
  ports:
    - pathPrefix: "/"
      port: 8080
      protocol: "HTTP"
  template:
    image: ghcr.io/volcano-sh/picod:latest
    imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: "500m"
        memory: "512Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
    networkPolicy:
      mode: Restricted
  sessionTimeout: "15m"
  maxSessionDuration: "8h"

---
# 2. Restricted mode with additional egress — allow outbound to 10.0.0.0/8 on port 443
apiVersion: runtime.agentcube.volcano.sh/v1alpha1
kind: CodeInterpreter
metadata:
  name: interpreter-restricted-egress
  namespace: default
spec:
  ports:
    - pathPrefix: "/"
      port: 8080
      protocol: "HTTP"
  template:
    image: ghcr.io/volcano-sh/picod:latest
    imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: "500m"
        memory: "512Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
    networkPolicy:
      mode: Restricted
      allowedEgress:
        - cidrs:
            - "10.0.0.0/8"
          ports:
            - protocol: TCP
              port: 443
  sessionTimeout: "15m"
  maxSessionDuration: "8h"

---
# 3. Custom mode — raw NetworkPolicy rules, full control
apiVersion: runtime.agentcube.volcano.sh/v1alpha1
kind: CodeInterpreter
metadata:
  name: interpreter-custom
  namespace: default
spec:
  ports:
    - pathPrefix: "/"
      port: 8080
      protocol: "HTTP"
  template:
    image: ghcr.io/volcano-sh/picod:latest
    imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: "500m"
        memory: "512Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
    networkPolicy:
      mode: Custom
      custom:
        ingress:
          - from:
              - podSelector:
                  matchLabels:
                    app: agentcube-router
        egress:
          - ports:
              - protocol: UDP
                port: 53
              - protocol: TCP
                port: 53
  sessionTimeout: "15m"
  maxSessionDuration: "8h"
