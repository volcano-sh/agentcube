# Default values for agentcube.

# Global settings
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Redis Configuration
# These must be provided by the user during installation
redis:
  addr: ""
  password: ""

# AgentCube Router
router:
  replicas: 1
  image:
    repository: ghcr.io/volcano-sh/agentcube-router
    pullPolicy: IfNotPresent
    tag: "latest"
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  config: {}
  extraEnv: []
  serviceAccountName: "agentcube-router"

# AgentCube Workload Manager
workloadmanager:
  replicas: 1
  image:
    repository: ghcr.io/volcano-sh/workloadmanager
    pullPolicy: IfNotPresent
    tag: "latest"
  service:
    type: ClusterIP
    port: 8080
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  extraEnv: []

# Volcano Agent Scheduler
volcano:
  scheduler:
    enabled: false
    replicas: 1
    image:
      repository: ghcr.io/volcano-sh/vc-agent-scheduler
      pullPolicy: IfNotPresent
      tag: "latest"

# SPIRE Configuration (Internal Workload Identity)
spire:
  enabled: false
  trustDomain: "cluster.local"
  clusterName: "agentcube-cluster"
  spiffeHelper:
    # Configuration for the spiffe-helper sidecar which automatically fetches and rotates mTLS certificates
    image:
      repository: ghcr.io/spiffe/spiffe-helper
      tag: "0.10.0"
      pullPolicy: IfNotPresent
    # Directory inside Router and WorkloadManager pods where the sidecar will deliver the certificates
    certDir: "/run/spire/certs"
    # Desired file names for the SVID certificate, private key, and root trust bundle
    certFileName: "svid.pem"
    keyFileName: "svid_key.pem"
    bundleFileName: "svid_bundle.pem"
  server:
    image:
      repository: ghcr.io/spiffe/spire-server
      tag: "1.12.0"
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 8081
    ca:
      ttl: "24h"
      x509SvidDefaultTtl: "1h"
    dataStore:
      type: "sqlite3"
      connectionString: "/run/spire/data/datastore.sqlite3"
    resources:
      limits:
        cpu: 200m
        memory: 512Mi
      requests:
        cpu: 50m
        memory: 128Mi
  agent:
    # For local dev clusters (kind/minikube), override with: --set spire.agent.insecureBootstrap=true --set spire.agent.skipKubeletVerification=true
    insecureBootstrap: false
    skipKubeletVerification: false
    image:
      repository: ghcr.io/spiffe/spire-agent
      tag: "1.12.0"
      pullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi
  controllerManager:
    image:
      repository: ghcr.io/spiffe/spire-controller-manager
      tag: "0.6.4"
      pullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi
