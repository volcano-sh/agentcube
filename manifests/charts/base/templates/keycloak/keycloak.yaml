{{- if .Values.keycloak.enabled }}
{{- if empty .Values.keycloak.adminUser }}
  {{- fail "keycloak.adminUser is required when keycloak.enabled is true" }}
{{- end }}
{{- if .Values.keycloak.database.vendor }}
{{- if empty .Values.keycloak.database.url }}
  {{- fail "keycloak.database.url is required when keycloak.database.vendor is set" }}
{{- end }}
{{- if empty .Values.keycloak.database.username }}
  {{- fail "keycloak.database.username is required when keycloak.database.vendor is set" }}
{{- end }}
{{- end }}
{{- if not .Values.keycloak.devMode }}
{{- if empty .Values.keycloak.existingSecret }}
  {{- fail "keycloak.existingSecret is required when devMode is false (production mode requires an external Secret for the admin password)" }}
{{- end }}
{{- if empty .Values.keycloak.database.vendor }}
  {{- fail "keycloak.database.vendor is required when devMode is false (production mode requires an external database)" }}
{{- end }}
{{- if empty .Values.keycloak.database.existingSecret }}
  {{- fail "keycloak.database.existingSecret is required when devMode is false (production mode requires an external Secret for the database password)" }}
{{- end }}
{{- if empty .Values.keycloak.proxy.hostname }}
  {{- fail "keycloak.proxy.hostname is required when devMode is false (production mode requires a strict hostname)" }}
{{- end }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: {{ .Release.Namespace }}
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: keycloak
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          image: "{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}"
          imagePullPolicy: {{ .Values.keycloak.image.pullPolicy }}
          # Note: --import-realm only applies on an empty database/first start.
          # Realm Secret updates will not be re-applied on subsequent pod restarts.
          {{- if .Values.keycloak.devMode }}
          args: ["start-dev", "--import-realm"]
          {{- else }}
          args: ["start", "--import-realm"]
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: management
              containerPort: 9000
              protocol: TCP
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: {{ .Values.keycloak.adminUser | quote }}
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.existingSecret | default "keycloak-credentials" }}
                  key: {{ if .Values.keycloak.existingSecret }}{{ .Values.keycloak.existingSecretKey | default "admin-password" }}{{ else }}admin-password{{ end }}
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_HTTP_PORT
              value: "8080"
            {{- if .Values.keycloak.database.vendor }}
            - name: KC_DB
              value: {{ .Values.keycloak.database.vendor | quote }}
            - name: KC_DB_URL
              value: {{ .Values.keycloak.database.url | quote }}
            - name: KC_DB_USERNAME
              value: {{ .Values.keycloak.database.username | quote }}
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.database.existingSecret | default "keycloak-credentials" }}
                  key: {{ if .Values.keycloak.database.existingSecret }}{{ .Values.keycloak.database.existingSecretKey | default "db-password" }}{{ else }}db-password{{ end }}
            {{- end }}
            {{- if .Values.keycloak.proxy.headers }}
            - name: KC_PROXY_HEADERS
              value: {{ .Values.keycloak.proxy.headers | quote }}
            {{- end }}
            {{- if .Values.keycloak.proxy.httpEnabled }}
            - name: KC_HTTP_ENABLED
              value: "true"
            {{- end }}
            {{- if .Values.keycloak.proxy.hostname }}
            - name: KC_HOSTNAME
              value: {{ .Values.keycloak.proxy.hostname | quote }}
            {{- end }}
          volumeMounts:
            - name: realm-config
              mountPath: /opt/keycloak/data/import
              readOnly: true
          # Keycloak's JVM + realm import takes 60-90s. The startup probe gives a 300s
          # window before liveness checks begin, preventing premature pod restarts.
          startupProbe:
            httpGet:
              path: /health/started
              port: management
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: management
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: management
            periodSeconds: 10
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
      volumes:
        - name: realm-config
          secret:
            secretName: keycloak-realm-config

---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: {{ .Release.Namespace }}
  labels:
    app: keycloak
spec:
  type: {{ .Values.keycloak.service.type }}
  ports:
    - port: {{ .Values.keycloak.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: keycloak
{{- end }}
