apiVersion: runtime.agentcube.volcano.sh/v1alpha1
kind: BrowserUse
metadata:
  name: playwright-mcp
  namespace: default
spec:
  targetPort:
    - pathPrefix: "/"
      port: 8931
      protocol: "HTTP"
  podTemplate:
    labels:
      app: playwright-mcp
    spec:
      containers:
        - name: playwright-mcp
          image: mcr.microsoft.com/playwright/mcp:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--port"
            - "8931"
            - "--host"
            - "0.0.0.0"
          ports:
            - containerPort: 8931
              protocol: TCP
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
  sessionTimeout: "30m"
  maxSessionDuration: "8h"
