apiVersion: apps/v1
kind: Deployment
metadata:
  name: workloadmanager
  namespace: {{ .Release.Namespace }}
  labels:
    app: workloadmanager
spec:
  replicas: {{ .Values.workloadmanager.replicas }}
  selector:
    matchLabels:
      app: workloadmanager
  template:
    metadata:
      labels:
        app: workloadmanager
    spec:
      serviceAccountName: workloadmanager
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        {{- if .Values.spire.enabled }}
        - name: spiffe-helper
          image: "{{ .Values.spire.spiffeHelper.image.repository }}:{{ .Values.spire.spiffeHelper.image.tag }}"
          imagePullPolicy: {{ .Values.spire.spiffeHelper.image.pullPolicy }}
          args:
            - "-config"
            - "/etc/spiffe-helper/spiffe-helper.conf"
          volumeMounts:
            - name: spiffe-helper-config
              mountPath: /etc/spiffe-helper
              readOnly: true
            - name: spire-agent-socket
              mountPath: /run/spire/sockets
              readOnly: true
            - name: spire-certs
              mountPath: {{ .Values.spire.spiffeHelper.certDir }}
        {{- end }}
        - name: workloadmanager
          {{- if .Values.spire.enabled }}
          volumeMounts:
            - name: spire-certs
              mountPath: {{ .Values.spire.spiffeHelper.certDir }}
              readOnly: true
          {{- end }}
          image: "{{ .Values.workloadmanager.image.repository }}:{{ .Values.workloadmanager.image.tag }}"
          imagePullPolicy: {{ .Values.workloadmanager.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.workloadmanager.service.port }}
              protocol: TCP
          env:
            - name: AGENTCUBE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REDIS_PASSWORD
              value: {{ .Values.redis.password | quote }}
            - name: REDIS_ADDR
              value: {{ .Values.redis.addr | quote }}
            {{- with .Values.workloadmanager.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          args:
            - --port={{ .Values.workloadmanager.service.port }}
            - --runtime-class-name=
            - --router-selector={{ .Values.workloadmanager.networkPolicy.routerSelector }}
            {{- if .Values.workloadmanager.networkPolicy.routerNamespace }}
            - --router-namespace={{ .Values.workloadmanager.networkPolicy.routerNamespace }}
            {{- end }}
          resources:
            {{- toYaml .Values.workloadmanager.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.workloadmanager.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.workloadmanager.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
      {{- if .Values.spire.enabled }}
      volumes:
        - name: spire-agent-socket
          hostPath:
            path: /run/spire/sockets
            type: DirectoryOrCreate
        - name: spiffe-helper-config
          configMap:
            name: spiffe-helper-config
        - name: spire-certs
          emptyDir: {}
      {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: workloadmanager
  namespace: {{ .Release.Namespace }}
  labels:
    app: workloadmanager
spec:
  type: {{ .Values.workloadmanager.service.type }}
  ports:
    - port: {{ .Values.workloadmanager.service.port }}
      targetPort: {{ .Values.workloadmanager.service.port }}
      protocol: TCP
      name: http
  selector:
    app: workloadmanager