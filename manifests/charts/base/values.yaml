# Default values for agentcube.

# Global settings
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Redis Configuration
# These must be provided by the user during installation
redis:
  addr: ""
  # Chart-managed Secret from this value when secretName is unset. Do not set both password and secretName.
  password: ""
  # User-provided Secret name. When set, the chart does not create {release}-redis.
  secretName: ""
  # Key in the Secret (chart-managed or secretName). Default: password.
  secretKey: "password"

# AgentCube Router
router:
  replicas: 1
  image:
    repository: ghcr.io/volcano-sh/agentcube-router
    pullPolicy: IfNotPresent
    tag: "latest"
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  config: {}
  extraEnv: []
  serviceAccountName: "agentcube-router"

# AgentCube Workload Manager
workloadmanager:
  replicas: 1
  image:
    repository: ghcr.io/volcano-sh/workloadmanager
    pullPolicy: IfNotPresent
    tag: "latest"
  service:
    type: ClusterIP
    port: 8080
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  extraEnv: []

# Volcano Agent Scheduler
volcano:
  scheduler:
    enabled: false
    replicas: 1
    image:
      repository: ghcr.io/volcano-sh/vc-agent-scheduler
      pullPolicy: IfNotPresent
      tag: "latest"

# SPIRE Configuration (Internal Workload Identity)
spire:
  enabled: false
  trustDomain: "cluster.local"
  clusterName: "agentcube-cluster"
  spiffeHelper:
    # Configuration for the spiffe-helper sidecar which automatically fetches and rotates mTLS certificates
    image:
      repository: ghcr.io/spiffe/spiffe-helper
      tag: "0.10.0"
      pullPolicy: IfNotPresent
    # Directory inside Router and WorkloadManager pods where the sidecar will deliver the certificates
    certDir: "/run/spire/certs"
    # Desired file names for the SVID certificate, private key, and root trust bundle
    certFileName: "svid.pem"
    keyFileName: "svid_key.pem"
    bundleFileName: "svid_bundle.pem"
  server:
    image:
      repository: ghcr.io/spiffe/spire-server
      tag: "1.12.0"
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 8081
    ca:
      ttl: "24h"
      x509SvidDefaultTtl: "1h"
    dataStore:
      type: "sqlite3"
      connectionString: "/run/spire/data/datastore.sqlite3"
    resources:
      limits:
        cpu: 200m
        memory: 512Mi
      requests:
        cpu: 50m
        memory: 128Mi
  agent:
    # For local dev clusters (kind/minikube), override with: --set spire.agent.insecureBootstrap=true --set spire.agent.skipKubeletVerification=true
    insecureBootstrap: false
    skipKubeletVerification: false
    image:
      repository: ghcr.io/spiffe/spire-agent
      tag: "1.12.0"
      pullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi
  controllerManager:
    image:
      repository: ghcr.io/spiffe/spire-controller-manager
      tag: "0.6.4"
      pullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

# Keycloak Configuration (External User Authentication)
keycloak:
  enabled: false
  # Use start-dev mode (embedded H2 DB, HTTP) for local development.
  # Set to false for production — requires database.vendor and proxy settings below.
  devMode: true
  image:
    repository: quay.io/keycloak/keycloak
    tag: "26.0"
    pullPolicy: IfNotPresent
  adminUser: "admin"
  adminPassword: "admin"  # Override in production via --set or external Secret
  existingSecret: ""       # Name of a pre-existing Secret containing admin credentials
  existingSecretKey: "admin-password"  # Key within the Secret holding the password
  # External database configuration (required when devMode is false)
  database:
    vendor: ""             # Database type: "postgres", "mysql", "mariadb". Empty = embedded H2 (dev only).
    url: ""                # JDBC URL, e.g., "jdbc:postgresql://postgres:5432/keycloak"
    username: ""
    password: ""
    existingSecret: ""     # Name of a pre-existing Secret containing the database password
    existingSecretKey: "db-password"
  # Reverse proxy configuration (required when Keycloak is behind an Ingress or load balancer)
  proxy:
    headers: ""            # Proxy header mode: "xforwarded" or "forwarded". Empty = disabled.
    httpEnabled: false     # Allow HTTP traffic when running behind a TLS-terminating proxy
    hostname: ""           # Public hostname, e.g., "keycloak.example.com". Empty = auto-detect.
  service:
    type: ClusterIP
    port: 8080
  realm: "agentcube"
  sdk:
    redirectUris:
      - "http://localhost*"
    webOrigins:
      - "http://localhost*"
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 512Mi
