{{- $renderAdmin := not .Values.admin.existingSecret }}
{{- $renderDb := and .Values.database.vendor (not .Values.database.existingSecret) }}
{{- $renderClients := not .Values.clients.existingSecret }}
{{- if or $renderAdmin $renderDb $renderClients }}
# Chart-managed Secret for Keycloak admin, database, and/or client credentials.
# Rendered if any of these credentials need to be managed by the chart.
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    app: keycloak
type: Opaque
stringData:
  {{- if $renderAdmin }}
  admin-password: {{ required "admin.password is required when admin.existingSecret is not set" .Values.admin.password | quote }}
  {{- end }}
  {{- if $renderDb }}
  db-password: {{ required "database.password is required when database.vendor is set and database.existingSecret is not set" .Values.database.password | quote }}
  {{- end }}
  {{- if $renderClients }}
  client-service-secret: {{ required "clients.service.secret is required when clients.existingSecret is not set" .Values.clients.service.secret | quote }}
  client-router-secret: {{ required "clients.router.secret is required when clients.existingSecret is not set" .Values.clients.router.secret | quote }}
  client-admin-secret: {{ required "clients.admin.secret is required when clients.existingSecret is not set" .Values.clients.admin.secret | quote }}
  {{- end }}
{{- end }}
